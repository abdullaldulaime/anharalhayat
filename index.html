<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كشف حساب الزبائن</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
    direction:rtl;
}

.container{
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:1200px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#3f51b5;
}

input{
    margin:20px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#3f51b5;
    color:white;
    padding:10px;
}

table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

.summary{
    margin-top:20px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    background:#f0f0f0;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
}

button{
    background:#3f51b5;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container" id="report">

<h1>كشف حساب الزبائن</h1>

<input type="file" id="excelFile">

<table id="table">
<thead>
<tr>
<th>التاريخ</th>
<th>النوع</th>
<th>المستند</th>
<th>البيان</th>
<th>مدين</th>
<th>دائن</th>
<th>الرصيد</th>
</tr>
</thead>

<tbody></tbody>
</table>

<div class="summary">
<div class="card">
إجمالي المدين
<div id="totalDebit">0</div>
</div>

<div class="card">
إجمالي الدائن
<div id="totalCredit">0</div>
</div>

<div class="card">
الرصيد النهائي
<div id="finalBalance">0</div>
</div>
</div>

<button onclick="downloadPDF()">تحميل PDF</button>

</div>

<script>

document.getElementById('excelFile').addEventListener('change', handleFile);

function handleFile(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event){

const data = new Uint8Array(event.target.result);

const workbook = XLSX.read(data,{type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const rows = XLSX.utils.sheet_to_json(sheet);

const tbody = document.querySelector("#table tbody");

tbody.innerHTML='';

let totalDebit = 0;
let totalCredit = 0;
let finalBalance = 0;

rows.forEach(row=>{

const tr = document.createElement('tr');

tr.innerHTML = `
<td>${row.Date || ''}</td>
<td>${row.Type || ''}</td>
<td>${row.Doc || ''}</td>
<td>${row.Description || ''}</td>
<td>${row.Debit || 0}</td>
<td>${row.Credit || 0}</td>
<td>${row.Balance || 0}</td>
`;

tbody.appendChild(tr);

totalDebit += Number(row.Debit || 0);
totalCredit += Number(row.Credit || 0);
finalBalance = row.Balance || 0;

});

document.getElementById('totalDebit').innerText = totalDebit;
document.getElementById('totalCredit').innerText = totalCredit;
document.getElementById('finalBalance').innerText = finalBalance;

};

reader.readAsArrayBuffer(file);

}

function downloadPDF(){

const element = document.getElementById('report');

html2pdf().from(element).save('account_statement.pdf');

}

</script>

</body>
</html>
